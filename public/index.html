<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSBox</title>
  <link rel="stylesheet" href="/vendor/monaco-editor/min/vs/editor/editor.main.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header class="toolbar">
    <div class="toolbar__brand">
      <svg class="toolbar__logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6h16M4 12h10M4 18h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="18" cy="15" r="4" stroke="currentColor" stroke-width="2"/>
        <path d="M16.5 14h3M18 12.5v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="toolbar__title">CSBox</span>
    </div>
    <div class="toolbar__actions">
      <button id="btn-theme" class="btn btn--icon" title="Wissel thema" aria-label="Wissel thema">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span>Thema</span>
      </button>
      <button id="btn-layout" class="btn btn--icon" title="Wissel layout" aria-label="Wissel layout">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="3" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="13" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>Layout</span>
      </button>
      <button id="btn-run" class="btn btn--primary" title="Voer code uit (Ctrl+Enter)">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="5,3 19,12 5,21" fill="currentColor"/>
        </svg>
        <span>Run</span>
      </button>
      <button id="btn-stop" class="btn btn--stop" title="Stop programma" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="5" width="14" height="14" rx="2" fill="currentColor"/>
        </svg>
        <span>Stop</span>
      </button>
      <label class="btn btn--secondary" title="Upload .cs bestand" style="cursor:pointer">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21V9M8 13l4-4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Upload</span>
        <input type="file" id="input-upload" accept=".cs,.zip" style="display:none" />
      </label>
      <button id="btn-download" class="btn btn--secondary" title="Download als .cs bestand">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3v12M8 11l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Download</span>
      </button>
    </div>
  </header>

  <main class="workspace" id="workspace">

    <div class="editor-panel" id="editor-panel">
      <div class="panel-header">
        <span class="panel-label panel-label--cs">C#</span>
        <button id="btn-format" class="btn btn--xs btn--icon" title="Formatteer code (Alt+Shift+F)">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 6h18M3 12h12M3 18h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M17 15l3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Format</span>
        </button>
      </div>
      <div class="panel-body" id="editor-cs"></div>
    </div>

    <div class="resizer resizer--main" id="main-resizer"></div>

    <div class="right-panel" id="right-panel">

      <div class="terminal-panel" id="terminal-panel">
        <div class="panel-header">
          <span class="panel-label">Terminal</span>
          <span class="terminal-status" id="terminal-status"></span>
          <button class="console-clear-btn" id="terminal-clear" title="Wis terminal">Wis</button>
        </div>
        <pre class="terminal-output" id="terminal-output"></pre>
        <div class="terminal-inputline" id="terminal-inputline">
          <span class="terminal-caret">›</span>
          <input type="text" id="terminal-input" class="terminal-input"
                 placeholder="Typ hier invoer en druk Enter..."
                 autocomplete="off" spellcheck="false" disabled />
        </div>
      </div>

      <div class="resizer resizer--vertical" id="right-resizer"></div>

      <div class="errors-panel" id="errors-panel">
        <div class="panel-header" id="errors-toggle">
          <span class="panel-label">Fouten</span>
          <span class="errors-badge" id="errors-badge"></span>
          <button class="console-clear-btn" id="errors-clear" title="Wis fouten">Wis</button>
          <button class="btn-collapse" id="btn-errors-toggle" title="Klap in/uit">
            <svg viewBox="0 0 24 24" fill="none"><path d="M5 15l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="panel-body errors-body" id="errors-body"></div>
      </div>

    </div>

  </main>

  <script src="/vendor/jszip.min.js"></script>
  <script>
    var require = { paths: { vs: '/vendor/monaco-editor/min/vs' } };
  </script>
  <script src="/vendor/monaco-editor/min/vs/loader.js"></script>
  <script src="/js/main.js"></script>

</body>
</html>
